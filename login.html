<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Enivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-50 min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <!-- Background Blobs -->
    <div class="absolute top-0 -left-4 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-[128px] opacity-50"></div>
    <div class="absolute bottom-0 -right-4 w-72 h-72 bg-indigo-500 rounded-full mix-blend-multiply filter blur-[128px] opacity-50"></div>

    <div class="w-full max-w-md p-8 relative z-10">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 mb-4">
                <i class="ph-fill ph-star-four text-indigo-500 text-3xl"></i>
                <span class="text-2xl font-bold tracking-tight">Enivo<span class="text-indigo-500">.</span></span>
            </a>
            <h2 class="text-2xl font-bold">Welcome Back</h2>
            <p class="text-slate-400">Enter your details to access your account.</p>
        </div>

        <div class="glass-card rounded-2xl p-8 shadow-2xl">
            <div id="message-container"></div>

            <form class="space-y-6" id="login-form">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                    <input type="email" name="email" required class="w-full bg-slate-800/50 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder-slate-500" placeholder="you@example.com">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                    <input type="password" name="password" required class="w-full bg-slate-800/50 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder-slate-500" placeholder="••••••••">
                </div>

                <input type="hidden" name="action" value="login" id="action-input">
                <button type="submit" id="submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-lg transition-all duration-300 shadow-lg shadow-indigo-500/25">
                    Sign In
                </button>
                <div id="register-hint"></div>
            </form>

            <div class="mt-6 text-center border-t border-white/5 pt-4">
                <button type="button" id="toggle-mode" class="text-sm text-slate-400 hover:text-white transition-colors">
                    Don't have an account? <span class="text-indigo-400 font-medium">Register</span>
                </button>
            </div>
        </div>
        
        <div class="text-center mt-6">
            <a href="index.html" class="text-sm text-slate-400 hover:text-white transition-colors">← Back to Store</a>
        </div>
    </div>

    <script>
        // Initialize Supabase (Replace with your actual project URL and anon key)
        const supabaseUrl = 'https://gkwlgduowvopjvjjdmdh.supabase.co';
        const supabaseKey = 'sb_publishable_vcCf3PuoeUzQkwQPivJt5g_VclnRH7B';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const error = params.get('error');
            const success = params.get('success');
            const email = params.get('email');
            let isRegister = params.get('showRegister') === 'true';

            const form = document.getElementById('login-form');
            const formTitle = document.querySelector('h2');
            const formDesc = document.querySelector('p.text-slate-400');
            const actionInput = document.getElementById('action-input');
            const submitBtn = document.getElementById('submit-btn');
            const toggleBtn = document.getElementById('toggle-mode');
            const messageContainer = document.getElementById('message-container');

            // Handle Messages
            if (error || success) {
                const msg = error || success;
                const div = document.createElement('div');
                div.className = `mb-4 p-3 rounded border text-sm text-center ${error ? 'bg-red-500/20 border-red-500/50 text-red-200' : 'bg-green-500/20 border-green-500/50 text-green-200'}`;
                div.textContent = msg;
                messageContainer.appendChild(div);
            }

            // Handle Email
            if (email) {
                const emailInput = document.querySelector('input[name="email"]');
                if (emailInput) emailInput.value = email;
            }

            // Function to update UI based on mode
            const updateUI = () => {
                if (isRegister) {
                    // Register Mode
                    if(formTitle) formTitle.textContent = "Create Account";
                    if(formDesc) formDesc.textContent = "Join us to start shopping.";
                    if(actionInput) actionInput.value = 'add'; // Ensure this is 'add'
                    if(submitBtn) {
                        submitBtn.textContent = "Register Now";
                        submitBtn.className = "w-full bg-pink-600 hover:bg-pink-700 text-white font-medium py-3 rounded-lg transition-all duration-300 shadow-lg shadow-pink-500/25";
                    }
                    if(toggleBtn) toggleBtn.innerHTML = 'Already have an account? <span class="text-indigo-400 font-medium">Sign In</span>';
                } else {
                    // Login Mode
                    if(formTitle) formTitle.textContent = "Welcome Back";
                    if(formDesc) formDesc.textContent = "Enter your details to access your account.";
                    if(actionInput) actionInput.value = 'login';
                    if(submitBtn) {
                        submitBtn.textContent = "Sign In";
                        submitBtn.className = "w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-lg transition-all duration-300 shadow-lg shadow-indigo-500/25";
                    }
                    if(toggleBtn) toggleBtn.innerHTML = 'Don\'t have an account? <span class="text-indigo-400 font-medium">Register</span>';
                }
            };

            // Handle Form Submission
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();

                    const emailInput = form.querySelector('input[name="email"]');
                    const passwordInput = form.querySelector('input[name="password"]');
                    
                    // Use the hidden input as the source of truth for the action
                    const currentAction = actionInput.value || (isRegister ? 'add' : 'login');

                    // Prepare JSON payload
                    const payload = {
                        username: emailInput.value,
                        password: passwordInput.value,
                        action: currentAction
                    };
                    
                    if (currentAction === 'add') {
                        payload.details = 'Registered User';
                    }

                    try {
                        let authData, authError;

                        if (currentAction === 'add') {
                            // Register user with Supabase
                            const { data, error } = await supabase.auth.signUp({
                                email: payload.username,
                                password: payload.password
                            });
                            authData = data;
                            authError = error;
                        } else {
                            // Log in user with Supabase
                            const { data, error } = await supabase.auth.signInWithPassword({
                                email: payload.username,
                                password: payload.password
                            });
                            authData = data;
                            authError = error;
                        }

                        if (authError) {
                            alert(authError.message);
                            return;
                        }

                        if (currentAction === 'add') {
                            alert('Registration successful! Please verify your email (if enabled) or sign in.');
                            // Switch to login mode
                            isRegister = false;
                            updateUI();
                        } else {
                            // Login Success
                            localStorage.setItem('enivo_logged_in', 'true');
                            localStorage.setItem('enivo_user_email', authData.user.email);
                            localStorage.setItem('enivo_user_id', authData.user.id);
                            
                            // Transfer Cart Logic
                            const guestCartStr = localStorage.getItem('enivo_cart');
                            if (guestCartStr) {
                                const guestCart = JSON.parse(guestCartStr);
                                const userKey = 'enivo_cart_' + authData.user.email;
                                let userCart = JSON.parse(localStorage.getItem(userKey) || '[]');
                                // Merge guest cart into user cart
                                guestCart.forEach(item => userCart.push(item));
                                localStorage.setItem(userKey, JSON.stringify(userCart));
                                localStorage.removeItem('enivo_cart');
                            }
                            
                            window.location.href = 'index.html';
                        }
                    } catch (error) {
                        console.error('Error:', error);
                        alert(error.message);
                    }
                });
            }

            // Initialize UI
            updateUI();

            // Toggle Event
            if (toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    isRegister = !isRegister;
                    updateUI();
                    messageContainer.innerHTML = ''; // Clear messages on toggle
                });
            }
        });
    </script>
</body>
</html>
